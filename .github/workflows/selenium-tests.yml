name: Selenium-Java-Framework CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # ✅ Better way to setup Chrome for Selenium
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Run All Tests
        run: mvn clean test
        continue-on-error: true

      - name: Generate Allure Report
        if: always()
        run: mvn allure:report

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ github.run_number }}
          path: target/site/allure-report/
          retention-days: 30

      - name: Upload TestNG Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testng-reports-${{ github.run_number }}
          path: |
            target/surefire-reports/
            test-output/
          retention-days: 30

      - name: Test Summary
        if: always()
        run: |
          echo "## ✅ Test Execution Complete" >> $GITHUB_STEP_SUMMARY
          echo "**Run Number:** ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Reports Generated:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Allure Report" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ TestNG Reports" >> $GITHUB_STEP_SUMMARY